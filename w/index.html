<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>Backup Power Pro · Opening your quote</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --navy: #0b1f3b;
    --gold: #ffba00;
    --head: 'Outfit', sans-serif;
    --body: 'Inter', system-ui, -apple-system, sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100vh;
    background: var(--navy); color: #fff;
    font-family: var(--body); -webkit-font-smoothing: antialiased;
  }
  .wrap {
    min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 18px; padding: 32px 22px calc(32px + env(safe-area-inset-bottom));
    text-align: center;
  }
  .logo { height: 30px; width: auto; display: block; margin-bottom: 6px; }
  .spinner {
    width: 42px; height: 42px; border-radius: 50%;
    border: 3.5px solid rgba(255,255,255,0.16);
    border-top-color: var(--gold);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: reduce) { .spinner { animation: none; } }
  h1 { font-family: var(--head); font-weight: 800; font-size: 20px; letter-spacing: -0.01em; margin: 4px 0 0; color: #fff; }
  p { font-size: 15px; line-height: 1.55; color: rgba(255,255,255,0.78); margin: 0; max-width: 30ch; }
  /* error state */
  .err { display: none; }
  .err .btn {
    display: inline-flex; align-items: center; justify-content: center;
    min-height: 52px; padding: 0 26px; margin-top: 8px;
    font-family: var(--head); font-size: 16px; font-weight: 700; color: var(--navy);
    background: var(--gold); border-radius: 100px; text-decoration: none;
    box-shadow: 0 6px 24px rgba(255,186,0,0.30);
  }
  body.is-error .loading { display: none; }
  body.is-error .err { display: flex; flex-direction: column; align-items: center; gap: 14px; }
  .foot { font-size: 12.5px; color: var(--gold); font-family: var(--head); font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; margin-top: 6px; }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="/assets/images/logo-white-v2.png" alt="Backup Power Pro" />
    <div class="loading">
      <div class="spinner" role="status" aria-label="Loading your quote"></div>
      <h1>Opening your quote…</h1>
      <p>One second while I pull up your saved walk.</p>
    </div>
    <div class="err">
      <h1>This link has expired.</h1>
      <p>No problem, you can pick your quote back up right here.</p>
      <a class="btn" href="https://backuppowerpro.com/walk-v2/?src=w">Start your quote</a>
      <span class="foot">Key Goodson · Backup Power Pro</span>
    </div>
  </div>

<script>
(function () {
  var BASE = 'https://reowtzedjflwmlptupbk.supabase.co/functions/v1';
  function fail() { document.body.classList.add('is-error'); }
  try {
    var code = (new URLSearchParams(location.search).get('c') || '').toLowerCase();
    if (!/^[0-9a-z]{12}$/.test(code)) { fail(); return; }
    var done = false;
    // hard timeout so a hung network never spins forever
    var t = setTimeout(function () { if (!done) fail(); }, 8000);
    fetch(BASE + '/pre-read-view?c=' + encodeURIComponent(code))
      .then(function (r) { return r.ok ? r.json() : null; })
      .then(function (d) {
        done = true; clearTimeout(t);
        var token = d && d.token;
        if (token && /^[a-f0-9]{32,64}$/i.test(token)) {
          location.replace('/walk-v2/?t=' + token);
        } else { fail(); }
      })
      .catch(function () { done = true; clearTimeout(t); fail(); });
  } catch (e) { fail(); }
})();
</script>
</body>
</html>
