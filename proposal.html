<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://js.stripe.com 'unsafe-inline'; style-src 'self' https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https://*.supabase.co https://api.stripe.com https://maps.googleapis.com https://*.google.com; frame-src https://js.stripe.com https://www.google.com;">
<title>Proposal | Backup Power Pro</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha384-JcnsjUPPylna1s1fvi1u12X5qjY5OL56iySh75FdtrwhO/SWXgMjoVqcKyIIWOLk" crossorigin="anonymous" defer></script>
<style>
:root {
  --navy:#0b1f3b; --navy2:#1a3a5c; --gold:#ffba00;
  --green:#059669; --red:#dc2626; --border:#e4e8f0;
  --bg:#eef1f7; --text:#1a2a42; --text2:#4a5568; --text3:#6b7280;
  --blue:#1d4ed8;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;min-height:100%}

/* ── HEADER ─────────────────────────────────────────── */
.site-header{background:var(--navy);padding:18px 24px;text-align:center}
.site-header .brand{font-family:'Outfit',sans-serif;font-weight:800;font-size:20px;color:#fff;letter-spacing:-.01em}
.site-header .brand span{color:var(--gold)}
.site-header .tagline{font-size:12px;color:rgba(255,255,255,.5);margin-top:2px}

/* ── PAGE ───────────────────────────────────────────── */
.page{max-width:660px;margin:0 auto;padding:24px 20px 48px}

/* ── PROPERTY PHOTO BANNER ──────────────────────────── */
.property-banner{position:relative;width:calc(100% + 56px);margin:-28px -28px 0;background:var(--navy);overflow:hidden;flex-shrink:0;border-radius:16px 16px 0 0}
/* When banner is standalone (approved state), fix top bleed + add bottom gap */
#property-banner-wrap .property-banner{margin:0 -20px;width:calc(100% + 40px);border-radius:16px}
#property-banner-wrap{margin-bottom:16px}
/* Inside hero-card, restore bleed design (overrides standalone rules above) */
.hero-card #property-banner-wrap .property-banner{margin:-28px -28px 0;width:calc(100% + 56px);border-radius:16px 16px 0 0}
.hero-card #property-banner-wrap{margin-bottom:0}
.property-banner img{width:100%;height:auto;display:block;filter:saturate(1.5) contrast(1.08) brightness(0.95)}
.property-banner-grad{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(11,31,59,.5) 0%,transparent 30%,rgba(11,31,59,.35) 60%,#0b1f3b 100%);pointer-events:none}
.property-banner-for-tag{position:absolute;top:18px;left:18px;background:rgba(255,255,255,.18);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-radius:30px;padding:10px 22px;pointer-events:none}
.property-banner-for-text{font-family:'Outfit',sans-serif;font-size:18px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:#fff;text-shadow:0 1px 8px rgba(0,0,0,.3)}
.property-banner-label{position:absolute;bottom:0;left:0;right:0;padding:14px 20px 18px;pointer-events:none}
.property-banner-eyebrow{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.6);margin-bottom:4px}
.property-banner-addr{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;color:#fff;text-shadow:0 1px 6px rgba(0,0,0,.5);line-height:1.25}
.property-banner-initials{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Outfit',sans-serif;font-size:52px;font-weight:800;color:rgba(255,255,255,.18);letter-spacing:-3px;pointer-events:none;min-height:160px}
@media(max-width:480px){.property-banner{margin:-24px -20px 0;width:calc(100% + 40px)}.property-banner-addr{font-size:13px}.hero-card #property-banner-wrap .property-banner{margin:-24px -20px 0;width:calc(100% + 40px)}}
/* ── SCOPE + PRICE PRODUCT THUMBS ──────────────────── */
.scope-thumb{width:52px;height:52px;border-radius:9px;object-fit:cover;flex-shrink:0;margin-left:auto;box-shadow:0 2px 8px rgba(11,31,59,.1)}
.price-item-cell{display:flex;align-items:flex-start;gap:12px}
.price-thumb{width:44px;height:44px;border-radius:8px;object-fit:cover;flex-shrink:0;box-shadow:0 2px 8px rgba(11,31,59,.1)}

/* ── SCROLL REVEAL ──────────────────────────────────── */
.reveal{opacity:0;transform:translateY(32px);transition:opacity .65s ease,transform .65s ease}
.reveal.revealed{opacity:1;transform:translateY(0)}
.reveal-fast{transition-duration:.4s}
.reveal-delay-1{transition-delay:.08s}
.reveal-delay-2{transition-delay:.16s}
.reveal-delay-3{transition-delay:.24s}
.reveal-delay-4{transition-delay:.32s}

/* ── HERO CARD ──────────────────────────────────────── */
.hero-card{background:var(--navy);border-radius:20px;padding:28px 28px 24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden}
.hero-footer-row{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:16px;padding-top:14px;border-top:1px solid rgba(255,255,255,.09);flex-wrap:wrap}
.hero-date-text{font-size:11px;color:rgba(255,255,255,.42);font-weight:600;letter-spacing:.04em;font-family:'Outfit',sans-serif}
.expires-badge{font-size:10px;font-weight:700;letter-spacing:.04em;padding:3px 10px;background:rgba(255,186,0,.15);border-radius:20px;color:var(--gold);white-space:nowrap}
.hero-title{font-family:'Outfit',sans-serif;font-size:28px;font-weight:900;line-height:1.1;margin-bottom:6px}
.hero-sub{font-size:14px;color:rgba(255,255,255,.72);line-height:1.5}
.hero-meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:16px}
.hero-meta-label{font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:rgba(255,255,255,.45);margin-bottom:3px;font-family:'Outfit',sans-serif}
.hero-meta-value{font-size:13px;font-weight:600;color:#fff;word-break:break-word}

/* ── PERSONAL NOTE ──────────────────────────────────── */
.personal-note{background:linear-gradient(160deg,#fff 0%,#f9fbff 100%);border-radius:14px;padding:18px 20px;margin-bottom:16px;display:flex;gap:14px;align-items:flex-start;box-shadow:0 4px 24px rgba(11,31,59,.08),0 1px 4px rgba(11,31,59,.04)}
.personal-note-avatar{width:40px;height:40px;border-radius:50%;background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:900;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.personal-note-from{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text3);margin-bottom:5px}
.personal-note-text{font-size:13px;color:var(--text2);line-height:1.65}

/* ── REALITY BLOCK (problem + outcome combined) ─────── */
.reality-block{background:var(--navy);border-radius:16px;overflow:hidden;margin-bottom:16px;color:#fff}
.section-eyebrow{font-family:'Outfit',sans-serif;font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:10px;display:flex;align-items:center;gap:7px}
.problem-headline{font-family:'Outfit',sans-serif;font-size:22px;font-weight:900;line-height:1.2;color:#fff;margin-bottom:18px}
.reality-top{padding:24px 22px 20px}
.reality-bridge{margin:0;font-size:15px;color:rgba(255,255,255,.82);line-height:1.7;font-weight:500;max-width:36em}
.reality-bottom{padding:16px 22px 22px;background:rgba(255,255,255,.03);border-top:1px solid rgba(255,186,0,.15)}
.outcome-headline-inner{font-family:'Outfit',sans-serif;font-size:18px;font-weight:900;color:#fff;margin-bottom:10px;line-height:1.25}
.outcome-scenario-inner{font-size:13px;color:rgba(255,255,255,.68);line-height:1.8}

/* ── CARD (generic fallback) ─────────────────────────── */
.card{background:linear-gradient(160deg,#fff 0%,#f9fbff 100%);border-radius:14px;margin-bottom:16px;overflow:hidden;box-shadow:0 4px 24px rgba(11,31,59,.08),0 1px 4px rgba(11,31,59,.04)}
.card-icon{width:32px;height:32px;border-radius:8px;background:#f4f6fa;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.card-head{display:flex;align-items:center;gap:10px;padding:16px 20px;border-bottom:1px solid #f0f3f8}
.card-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.card-body{padding:20px}

/* ── SCOPE LIST ─────────────────────────────────────── */
.scope-list{list-style:none;display:grid;grid-template-columns:1fr 1fr;gap:6px 14px}
.scope-item{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text);opacity:0;transform:translateX(-10px);transition:opacity .4s ease,transform .4s ease;padding:2px 0}
.scope-item.scope-in{opacity:1;transform:translateX(0)}
.scope-check{width:18px;height:18px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px}
.scope-check svg{width:10px;height:10px}
.scope-item-text strong{display:block;font-weight:600;font-size:13px}
.scope-item-text span{font-size:11px;color:var(--text3)}

/* ── INSTALL PHOTOS ─────────────────────────────────── */
.photos-section{margin-bottom:16px}
.photos-label{font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text3);text-align:center;margin-bottom:10px}
.photos-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
.photos-grid img{width:100%;height:90px;object-fit:cover;border-radius:8px;box-shadow:0 2px 10px rgba(11,31,59,.1);transition:transform .2s ease}
.photos-grid img:hover{transform:scale(1.04)}

/* ── SCOPE + PROOF UNIFIED BLOCK ────────────────────── */
.scope-proof-block{background:#fff;border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 4px 24px rgba(11,31,59,.08),0 1px 4px rgba(11,31,59,.04)}
.scope-proof-head{display:flex;align-items:center;gap:10px;padding:20px 20px 16px}
.scope-proof-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.scope-proof-body{padding:0 20px 22px}
.scope-proof-anchor{padding:22px 20px 18px;background:#f9fbff}
.anchor-headline{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;text-align:center;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:18px}
.anchor-vs-row{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:14px}
.anchor-col{flex:1;text-align:center}
.anchor-col-label{font-size:11px;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.anchor-price-old{font-family:'Outfit',sans-serif;font-size:30px;font-weight:900;color:#94a3b8;position:relative;display:inline-block}

.anchor-vs-badge{background:#fff;border-radius:20px;padding:5px 12px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:800;color:var(--text3);flex-shrink:0;box-shadow:0 2px 8px rgba(11,31,59,.1)}
.anchor-price-new{font-family:'Outfit',sans-serif;font-size:32px;font-weight:900;color:var(--green)}
.anchor-tagline{text-align:center;font-size:13px;color:var(--text2);line-height:1.5}
.anchor-tagline strong{color:var(--navy)}
.scope-proof-review{padding:18px 20px 20px;background:#f4f7fc}
.review-card-inner{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 2px 12px rgba(11,31,59,.07),0 1px 3px rgba(11,31,59,.04)}
.review-stars{font-size:13px;color:var(--gold);margin-bottom:6px;letter-spacing:1px}
.review-text{font-size:13px;color:var(--text);line-height:1.6;margin-bottom:8px}
.review-author{font-size:11px;font-weight:700;color:var(--text3)}
.proof-rating-row{display:flex;align-items:center;justify-content:center;gap:8px}
.review-carousel{position:relative;overflow:hidden;/* height set by JS */}
.review-slide{position:absolute;top:0;left:0;right:0;opacity:0;visibility:hidden;transition:opacity .45s ease;pointer-events:none}
.review-slide.active{opacity:1;visibility:visible;pointer-events:auto}
.carousel-dots{display:flex;justify-content:center;gap:6px;margin-top:12px;margin-bottom:2px}
.carousel-dot{width:6px;height:6px;border-radius:50%;background:#cbd5e1;border:none;padding:0;cursor:pointer;transition:background .3s}
.carousel-dot.active{background:var(--navy)}

/* ── AMP TOGGLE ─────────────────────────────────────── */
.amp-toggle-wrap{margin-bottom:16px}
.amp-toggle-label{font-family:'Outfit',sans-serif;font-size:12px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px;text-align:center}
.amp-toggle{display:flex;background:#f1f5f9;border-radius:12px;padding:4px;gap:4px}
.amp-toggle-btn{flex:1;padding:12px 0;border-radius:10px;border:none;background:transparent;color:var(--text2);font-family:'Outfit',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center}
.amp-toggle-btn.active{background:var(--navy);color:#fff;box-shadow:0 2px 10px rgba(11,31,59,.25)}
.amp-toggle-btn:not(.active):hover{background:#e2e8f0}
.amp-toggle-btn .amp-sub{font-size:10px;font-weight:500;opacity:.7;display:block;margin-top:2px}

/* ── PRICING TABLE ──────────────────────────────────── */
.price-table{width:100%;border-collapse:collapse;font-size:14px}
.price-table td{padding:16px 0;border-bottom:1px solid #f0f3f8;vertical-align:top}
.price-table tr:last-child td{border-bottom:none}
.price-table td:last-child{text-align:right;font-weight:700;color:var(--navy);white-space:nowrap;padding-left:12px}
.price-item-name{font-weight:700;color:var(--navy);font-size:14px}
.price-item-desc{font-size:12px;color:var(--text3);margin-top:2px;margin-bottom:8px}
.price-item-bullets{display:flex;flex-direction:column;gap:4px;margin-top:6px}
.price-item-bullet{font-size:12px;color:var(--text2);display:flex;align-items:baseline;gap:6px;line-height:1.4}
.price-item-bullet::before{content:'✓';color:var(--green);font-weight:900;font-size:11px;flex-shrink:0}
.price-total-row td{padding-top:14px;font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.total-badge{background:var(--navy);color:var(--gold);font-family:'Outfit',sans-serif;font-weight:800;font-size:17px;padding:5px 14px;border-radius:8px;display:inline-block;transition:all .3s}
.per-day-note{text-align:center;padding:10px 0 2px;font-size:13px;color:var(--text3);line-height:1.5}

/* ── POM CARD ───────────────────────────────────────── */
/* ── UNIFIED INVESTMENT BLOCK ───────────────────────── */
.investment-block{background:linear-gradient(160deg,#fff 0%,#fffdf5 100%);border-radius:16px;overflow:hidden;margin-bottom:16px;box-shadow:0 6px 32px rgba(11,31,59,.1),0 2px 8px rgba(11,31,59,.05)}
.investment-head{padding:16px 20px 12px;border-bottom:1px solid #f0f3f8;display:flex;align-items:center;gap:10px}
.investment-head h2{font-family:'Outfit',sans-serif;font-size:16px;font-weight:800;color:var(--navy)}
.investment-head-icon{width:32px;height:32px;border-radius:8px;background:#fffbeb;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.investment-items{padding:4px 20px 0}
.pom-divider-bar{background:var(--gold);padding:7px 20px;display:flex;align-items:center;justify-content:space-between;font-family:'Outfit',sans-serif;font-size:10px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#7a4a00}
.pom-section{background:linear-gradient(135deg,#0b1f3b 0%,#1a3a5c 100%);padding:18px 20px;cursor:pointer;transition:background .2s}
.pom-section:hover{background:linear-gradient(135deg,#0f2a50 0%,#1e4570 100%)}
.pom-top-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.pom-title{font-family:'Outfit',sans-serif;font-size:15px;font-weight:900;color:#fff;flex:1}
.pom-price-label{font-family:'Outfit',sans-serif;font-size:20px;font-weight:900;color:var(--gold);text-align:right;flex-shrink:0}
.pom-price-sub{font-size:10px;color:rgba(255,255,255,.4);font-weight:600;text-align:right}
.pom-features-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pom-feature-pill{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:9px 11px;display:flex;align-items:flex-start;gap:8px}
.pom-feature-pill-title{font-size:12px;font-weight:700;color:#fff;line-height:1.3}
.pom-feature-pill-desc{font-size:11px;color:rgba(255,255,255,.5);line-height:1.4;margin-top:2px}
.investment-total-section{padding:14px 20px 16px;border-top:1px solid #f0f3f8;display:flex;align-items:center;justify-content:space-between}
.investment-total-label{font-family:'Outfit',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.investment-per-day{text-align:center;padding:0 20px 14px;font-size:13px;color:var(--text3)}
@media(max-width:480px){.pom-features-grid{grid-template-columns:1fr}}
.pom-body{padding:16px 18px 18px;position:relative}
.pom-body::before{content:'';position:absolute;top:0;right:0;width:140px;height:140px;background:radial-gradient(circle,rgba(255,186,0,.08),transparent 70%)}
.surge-toggle-track{width:52px;height:32px;border-radius:16px;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.2);cursor:pointer;position:relative;transition:all .25s;flex-shrink:0}
.surge-toggle-track.on{background:var(--gold);border-color:var(--gold)}
.surge-toggle-knob{width:24px;height:24px;border-radius:50%;background:#fff;position:absolute;top:2px;left:2px;transition:transform .25s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
.surge-toggle-track.on .surge-toggle-knob{transform:translateX(20px)}
.pom-feature{display:flex;align-items:flex-start;gap:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:10px 12px}
.pom-feature-title{font-size:12px;font-weight:700;color:#fff;margin-bottom:2px}
.pom-feature-desc{font-size:11px;color:rgba(255,255,255,.55);line-height:1.4}

/* ── BNPL BLOCKS (Afterpay + Klarna) ────────────────── */
.bnpl-inner{padding:8px 20px 16px}
.bnpl-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:8px}
.bnpl-options{display:flex;gap:8px}
.bnpl-option{flex:1;background:#f8f9fb;border-radius:9px;padding:9px 10px;display:flex;align-items:center;gap:8px}
.bnpl-option-text{font-size:11px;color:var(--text2);line-height:1.4}
.bnpl-option-text strong{display:block;font-size:11px;font-weight:700;color:var(--navy);margin-bottom:1px}
@media(max-width:420px){.bnpl-options{flex-direction:column}}

/* ── GUARANTEE SECTION ──────────────────────────────── */
.guarantee-section{background:linear-gradient(160deg,#fff 0%,#f9fbff 100%);border-radius:16px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 24px rgba(11,31,59,.08),0 1px 4px rgba(11,31,59,.04)}
.guarantee-item{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;background:#fff;border-radius:10px;margin-bottom:10px;box-shadow:0 2px 12px rgba(11,31,59,.07),0 1px 3px rgba(11,31,59,.03)}
.guarantee-item:last-child{margin-bottom:0}
.guarantee-icon{font-family:'Outfit',sans-serif;font-size:15px;font-weight:800;color:var(--navy);width:28px;height:28px;border-radius:8px;background:#f0f4f9;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.guarantee-item-title{font-family:'Outfit',sans-serif;font-size:13px;font-weight:800;color:var(--navy);margin-bottom:2px}
.guarantee-item-desc{font-size:12px;color:var(--text2);line-height:1.45}

/* ── AUTHORITY BADGES ───────────────────────────────── */
.badge-row{display:flex;gap:7px;flex-wrap:wrap;justify-content:center;margin-top:18px}
.authority-badge{display:flex;align-items:center;gap:5px;padding:6px 12px;background:var(--navy);color:#fff;border-radius:20px;font-family:'Outfit',sans-serif;font-size:11px;font-weight:700;opacity:.9}

/* ── NEXT-STEP NOTICE (quiet, not scarcity) ─────────── */
.scarcity-notice{padding:8px 8px 18px;margin-bottom:4px;text-align:center}

<script>
  // Tag this pageview with proposal context so PostHog can group all events
  // from this customer's quote session together.
  (function() {
    if (typeof posthog === 'undefined') return;
    var token = new URLSearchParams(window.location.search).get('token') || '';
    posthog.register({ page_type: 'proposal', proposal_token: token.slice(0, 8) });
    // Track time-on-page milestones, helps us spot where customers stall
    // reading the quote (pricing? terms? deposit button?).
    var timeMilestones = [10, 30, 60, 120, 300]; // seconds
    timeMilestones.forEach(function(t) {
      setTimeout(function() {
        posthog.capture('proposal_time_on_page', { seconds: t });
      }, t * 1000);
    });
    // Mark when customer hits bottom of proposal, strong intent signal.
    var bottomSeen = false;
    window.addEventListener('scroll', function() {
      if (bottomSeen) return;
      var h = document.documentElement;
      if ((h.scrollTop + h.clientHeight) / h.scrollHeight > 0.9) {
        bottomSeen = true;
        posthog.capture('proposal_scrolled_to_bottom');
      }
    }, { passive: true });
    // Delegate click tracking on Pay / Approve / Decline buttons, don't
    // have to wire up every button individually; match by text content.
    document.addEventListener('click', function(ev) {
      var el = ev.target.closest('button, a');
      if (!el) return;
      var text = (el.textContent || '').trim().toLowerCase();
      if (/pay (deposit|full|now)|lock in|pay \$|approve|accept/.test(text)) {
        posthog.capture('proposal_payment_cta_clicked', { label: text.slice(0, 50) });
      } else if (/decline|reject|not interested/.test(text)) {
        posthog.capture('proposal_declined_cta', { label: text.slice(0, 50) });
      }
    }, { capture: true });
  })();
</script>

function getPrice(amp) {
  if (amp === '50' && P.pricing_50) return P.pricing_50;
  if (amp === '30' && P.pricing_30) return P.pricing_30;
  return { base: P.price_base || 0, cord: P.include_cord ? (P.price_cord || 150) : 0, cordIncluded: P.include_cord, mainBreaker: 0, twinQuad: 0, longRun: 0, permitInspection: 0, total: P.total || 0 };
}

function calcTotal(amp) {
  const pr = getPrice(amp);
  const base = pr.total || pr.base || 0;
  const pomAdder = pomOn ? (P.pom_price || 447) : 0;
  const customAdder = Array.isArray(P.custom_items) ? P.custom_items.reduce((s, i, idx) => s + (customItemsOn[idx] !== false ? (i.price || 0) : 0), 0) : 0;
  // V3 percent discount: recompute against current amp's subtotal so toggling amps stays consistent.
  if (P.creator_version === 'v3' && P._v3_discount_pct > 0) {
    const sub = base + customAdder;
    P.discount_amount = Math.round(sub * P._v3_discount_pct / 100);
  }
  // V3 totals must subtract the discount themselves (v2 bakes it into pr.total at create time).
  const v3Discount = (P.creator_version === 'v3' && P.discount_amount > 0) ? P.discount_amount : 0;
  return base + pomAdder + customAdder - v3Discount;
}

      entry.target.classList.add('revealed');
      // Trigger price anchor strike-through
      if (entry.target.id === 'anchor-section') {
      }

        entry.target.querySelectorAll('.scope-item').forEach((el, i) => {
          setTimeout(() => el.classList.add('scope-in'), i * 80);

}

// V3 NORMALIZATION, runs from BOTH renderProposal and renderApprovedView.
// V3 saves a single consolidated total; the legacy renderer expects pricing
// objects with broken-out base / cord / permit / longRun. We synthesize them
// from the consolidated total so the customer sees an itemized breakdown
// that still sums to the agreed-upon number.
//
// Math contract: pricing.base IS the consolidated total. The renderer's
// main "Installation" row computes `base - cord - permit - longRun - mb - tq`
// to derive a clean "installation labor" subtotal. Cord/permit show as
// separate line items at their list price ($129/$249 for cord, $125 for
// permit). Toggling cord/inlet/permit OFF in the creator removes both the
// line item AND its discount from the base, so total stays constant.
function applyV3Normalization() {
  if (P.creator_version === 'v3' && !P.pricing_30) {
    const V3P = { base:{30:1197,50:1497}, perFt:{30:12,50:14},
      cordOff:{30:129,50:249}, inletOff:{30:129,50:179}, permitOff:125 };
    const lengthFt = Number(P.length_ft || P.run_ft || 5);
    const extraFt  = Math.max(0, lengthFt - 5);
    const includeCord   = P.include_cord   !== false;
    const includeInlet  = P.include_inlet  !== false;
    const includePermit = P.include_permit !== false;
    const buildPr = (amp) => {
      const a = String(amp);
      const longRun = extraFt * V3P.perFt[a];
      const cordOffDisc   = includeCord   ? 0 : V3P.cordOff[a];
      const inletOffDisc  = includeInlet  ? 0 : V3P.inletOff[a];
      const permitOffDisc = includePermit ? 0 : V3P.permitOff;
      const subtotal = V3P.base[a] + longRun - cordOffDisc - inletOffDisc - permitOffDisc;
      // Surface cord + permit at list price WHEN included so they appear
      // as itemized line items. The main "Installation" row's math
      // (base - cord - permit) backs them out, leaving the labor remainder.
      // Toggle-off paths set 0 + skip the row entirely.
      return {
        base: subtotal,
        cord: includeCord ? V3P.cordOff[a] : 0,
        mainBreaker: 0, twinQuad: 0,
        longRun: longRun,
        permitInspection: includePermit ? V3P.permitOff : 0,
        total: subtotal,
      };
    };
    P.pricing_30 = buildPr('30');
    P.pricing_50 = buildPr('50');
    return true;
  }
  return false;
}

// ── ACK ROW WIRING ───────────────────────────────────────────
function wireAckRow(rowId, boxId, key) {
  const row = document.getElementById(rowId);
  row.addEventListener('click', function(e) {
    if (e.target.tagName === 'A') return;
    if (key === 'scope') ackScope = !ackScope;
    else ackSafety = !ackSafety;
    updateAckVisual(rowId, boxId, key === 'scope' ? ackScope : ackSafety);
    validateForm();
  });
}

function updateAckVisual(rowId, boxId, checked) {
  const row = document.getElementById(rowId);
  const box = document.getElementById(boxId);
  const svg = box.querySelector('svg');
  if (checked) { row.classList.add('checked'); svg.style.display = ''; }
  else { row.classList.remove('checked'); svg.style.display = 'none'; }
}

// ── RENDER PRICING ───────────────────────────────────────────
function renderPricing() {
  const pr = getPrice(chosenAmp);
  const isNew = !!P.pricing_30 || !!P.pricing_50;
  let rows = '';

  if (isNew) {
    const base = pr.base || 0;
    const longRun = pr.longRun || 0;
    const mb = pr.mainBreaker || 0;
    const tq = pr.twinQuad || 0;
    const cord = pr.cord || 0;
    const permit = pr.permitInspection || 125;
    const _pi = (chosenAmp === '50' ? '50' : '30');
    const is50 = chosenAmp === '50';
    rows += priceRow(
      `${_pi} Amp Generator Home Connection Installation`,
      null,
      fmt(Math.max(0, base - mb - tq - cord - permit)),
      `assets/product-images/inlet-${_pi}amp.jpg`,
      [
        `${_pi}A weather-rated inlet box, exterior wall mount`,
        'Interlock kit, panel-matched, prevents back-feed to the grid',
        'Breaker wiring & panel work',
        'Site cleanup, we leave it the way we found it',
        'Step-by-step walkthrough before we leave'
      ]
    );
    if (longRun) {
      const lrDesc = (P.creator_version === 'v3')
        ? 'Extra wire length included, already in your quote'
        : `${P.run_ft || 5}ft of wire run, distance already included in your quote`;
      rows += priceRowIncluded('Extended Wire Run', lrDesc, null, null);
    }
    rows += priceRow(
      'Permit & County Inspection',
      null,
      fmt(permit),
      'assets/product-images/permit-inspection.jpg',
      [
        'Permit application filed with your county on your behalf',
        'Inspection scheduled and coordinated by us',
        'Certificate of completion, nothing for you to do'
      ]
    );
    if (cord) rows += priceRow(
      `${_pi}A Power Transfer Cord`,
      null,
      fmt(cord),
      `assets/product-images/cord-${_pi}amp.jpg`,
      [
        `Matches your generator's ${_pi}-amp output`,
        'Plugs directly into your new inlet box',
        'Heavy-duty, weather-resistant, stays in the garage'
      ]
    );
    if (mb) rows += priceRow('Main Breaker Replacement', 'Upgraded to current code requirements', fmt(mb));
    if (tq) rows += priceRow('Panel Space Optimization', 'Twin/quad breaker swap to free up slots', fmt(tq));
  } else {
    const _pi2 = (chosenAmp === '50' ? '50' : '30');
    rows += priceRow(`${_pi2} Amp Generator Home Connection Installation`, 'Inlet box, interlock kit, permit, inspection, walkthrough', fmt(pr.base || P.price_base), `assets/product-images/inlet-${_pi2}amp.jpg`);
    if (P.include_cord) rows += priceRow(`${_pi2}A Power Transfer Cord`, 'Connects generator to inlet box', fmt(P.price_cord), `assets/product-images/cord-${_pi2}amp.jpg`);
    if (P.include_surge) rows += priceRow('Whole-House Surge Protector', 'Installed on main panel', fmt(P.price_surge));
  }

  // Custom items rendered separately as toggle cards (see #custom-items-mount)
  renderCustomItems();

  if (P.discount_amount && P.discount_amount > 0) {
    const discountNote = P.notes ? P.notes.trim() : '';
    rows += `<tr class="price-row discount-row">
      <td class="price-row-content">
        <div class="price-row-name" style="color:var(--green)">Discount Applied</div>
        ${discountNote ? `<div class="price-row-desc" style="color:var(--text2);font-style:italic">${discountNote}, scope modification (see below)</div>` : ''}
      </td>
      <td class="price-row-price" style="color:var(--green);white-space:nowrap">−${fmt(P.discount_amount)}</td>
    </tr>`;
  }

  const total = calcTotal(chosenAmp);

  const itemsEl = document.getElementById('pricing-items');
  if (itemsEl) itemsEl.innerHTML = `<table class="price-table" style="margin:0">${rows}</table>`;

  const totalBadge = document.getElementById('total-badge');
  if (totalBadge) totalBadge.textContent = fmt(total);

  const perDay = document.getElementById('per-day-note');
  const requireDeposit = P.require_deposit !== false;
  const depositRate = Number(P?.deposit_rate ?? 0.20);
  const depositAmt = Math.round(total * depositRate);
  if (perDay) {
    if (requireDeposit) {
      perDay.innerHTML = `<strong style="color:var(--navy)">${Math.round(depositRate*100)}% deposit ($${depositAmt.toLocaleString()}) due to confirm your spot.</strong><br><span style="font-size:12px">Remaining balance due on install day. That's just $${(total / 3650).toFixed(2)}/day for 10 years of protection.</span>`;
    } else {
      perDay.innerHTML = `<span style="font-size:12px">One all-in price. Permit, inspection, and cord included.</span>`;
    }
  }

  // Update POM toggle visual
  const pomToggle = document.getElementById('pom-toggle');
  if (pomToggle) pomToggle.classList.toggle('on', pomOn);
  const pomCard = document.getElementById('pom-card');
  if (pomCard) { pomCard.style.boxShadow = pomOn ? 'inset 0 0 0 2px rgba(255,186,0,.4)' : ''; }

  const approveTotal = document.getElementById('approve-total');
  if (approveTotal) approveTotal.textContent = fmt(total);

  const anchorNew = document.getElementById('anchor-our-price');
  if (anchorNew) anchorNew.textContent = fmt(total);
}

function priceRow(name, desc, price, img, bullets) {
  const imgHtml = img ? `<img class="price-thumb" src="${img}" alt="" loading="lazy">` : '';
  const bulletsHtml = bullets?.length ? `<div class="price-item-bullets">${bullets.map(b => `<div class="price-item-bullet">${esc(b)}</div>`).join('')}</div>` : '';
  return `<tr><td><div class="price-item-cell">${imgHtml}<div><div class="price-item-name">${esc(name)}</div>${desc ? `<div class="price-item-desc">${esc(desc)}</div>` : ''}${bulletsHtml}</div></div></td><td>${price}</td></tr>`;
}

function priceRowIncluded(name, desc, img, bullets) {
  const imgHtml = img ? `<img class="price-thumb" src="${img}" alt="" loading="lazy">` : '';
  const bulletsHtml = bullets?.length ? `<div class="price-item-bullets">${bullets.map(b => `<div class="price-item-bullet">${esc(b)}</div>`).join('')}</div>` : '';
  return `<tr><td><div class="price-item-cell">${imgHtml}<div><div class="price-item-name">${esc(name)}</div>${desc ? `<div class="price-item-desc">${esc(desc)}</div>` : ''}${bulletsHtml}</div></div></td><td><span style="color:var(--green);font-size:12px;font-weight:700">✓ Included</span></td></tr>`;
}

function updateApproveBtn() {

async function payDeposit(payFull = false) {
  const btnId = payFull ? '[onclick="payDeposit(true)"]' : '[onclick="payDeposit()"]';
  const btn = document.querySelector(btnId);
  if (btn) { btn.disabled = true; btn.textContent = 'Redirecting...'; }
  try {
    const resp = await fetch(`${SUPABASE_URL}/functions/v1/proposal-deposit-checkout`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({ proposal_token: P.token, pay_full: payFull }),
    });
    const result = await resp.json();
    if (result.url) { window.location.href = result.url; return; }
    alert('Payment error: ' + (result.error || 'Unknown error'));
  } catch(e) { alert('Network error, please call (864) 863-7800.'); }

    btn.disabled = false;

      ? `Pay $${Math.round(P.total||0).toLocaleString()} in Full →`
      : `Pay $${Math.round((P.total||0)*0.5).toLocaleString()} Deposit Now →`;

// ── APPROVE ──────────────────────────────────────────────────
let approving = false;
async function approveProposal() {
  if (isPreview) { launchConfetti(); return; }
  if (approving) return;
  const name = document.getElementById('signer-name').value.trim();
  const err = document.getElementById('approve-err');
  const btn = document.getElementById('approve-btn');
  if (!name || !ackScope || !ackSafety) { err.textContent = 'Please complete all fields above.'; return; }
  approving = true;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner-large" style="width:20px;height:20px;border-width:2.5px;margin:0"></div> Submitting...';
  const total = calcTotal(chosenAmp);
  // IP is stamped server-side from X-Forwarded-For by the proposal-mutate
  // edge function, the old client-side ipify fetch was trivially
  // spoofable and corrupted the legal signing record. The terms snapshot
  // omits ip_address here; the authoritative IP is on the row.
  const termsSnapshot = JSON.stringify({ proposal_id: P.id, proposal_token: P.token, contact_name: P.contact_name, contact_address: P.contact_address, selected_amp: chosenAmp, selected_surge: surgeOn, surge_price: surgeOn ? (P.surge_price || 446) : 0, pricing: getPrice(chosenAmp), total, scope_acknowledged: true, safety_acknowledged: true, signer_name: name, signed_at: new Date().toISOString(), user_agent: navigator.userAgent });
  let signErrMsg = null;
  try {
    const signRes = await fetch(`${SUPABASE_URL}/functions/v1/proposal-mutate`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
      body: JSON.stringify({
        token: P.token,
        action: 'sign',
        signer_name: name,
        safety_ack: true,
        selected_amp: String(chosenAmp),
        selected_surge: !!surgeOn,
        selected_pom: !!pomOn,
        // Freeze the customer's TRUE displayed total (base + POM + custom line
        // items - discount). Without this the edge fn fell back to an amp-only
        // serverEstimate that DROPPED custom items, under-collecting the deposit
        // and breaking the balance charge (MONEY-01). Mirrors proposal-comp.html.
        // The server floors this at ampBase, so a tampered-low value cannot undercharge.
        signed_total: total,
        approved_terms_snapshot: termsSnapshot,
      }),
    });
    if (!signRes.ok) {
      const j = await signRes.json().catch(() => ({}));
      signErrMsg = j?.error || `HTTP ${signRes.status}`;
    }
  } catch (e) { signErrMsg = 'Network error'; }
  if (signErrMsg) { err.textContent = 'Something went wrong. Please try again or call (864) 863-7800.'; btn.disabled = false; approving = false; updateApproveBtn(); return; }
  // Reflect the SERVER truth: signing sets status='Signed', NOT 'Approved'. Only a
  // paid deposit (via the stripe-webhook) grants 'Approved'. Setting 'Approved' here
  // was a local display lie that let the post-sign UI claim approval before any money
  // was collected. Keep it 'Signed' so any re-render shows the honest deposit ask.
  P.status = 'Signed'; P.signer_name = name; P.signed_at = new Date().toISOString(); P.selected_amp = chosenAmp; P.selected_surge = surgeOn; P.selected_pom = pomOn; P.total = total;

  const requireDeposit = P.require_deposit !== false;
  if (requireDeposit) {
    btn.innerHTML = '<div class="spinner-large" style="width:20px;height:20px;border-width:2.5px;margin:0"></div> Redirecting to payment...';
    const resetBtn = () => {
      btn.disabled = false; approving = false;
      const depositRate = Number(P?.deposit_rate ?? 0.20);
  const depositAmt = Math.round(total * depositRate);
      btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> <span id="approve-btn-label">${selectedPayFull ? `Confirm &amp; Pay ${fmt(total)} in Full` : `Confirm &amp; Pay ${fmt(depositAmt)} Deposit`}</span>`;
    };
    try {
      const resp = await fetch(`${SUPABASE_URL}/functions/v1/proposal-deposit-checkout`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SUPABASE_KEY}` },
        body: JSON.stringify({ proposal_token: P.token, pay_full: selectedPayFull }),
      });
      const result = await resp.json();
      if (result.error || !result.url) {
        err.textContent = 'Payment setup failed: ' + (result.error || 'Unknown error');
        resetBtn(); return;
      }
      // Validate the redirect URL server response, only Stripe's own
      // domains are acceptable. Prevents a compromised edge function
      // from redirecting to javascript:... or a Stripe look-alike.
      let target = null;
      try {
        const u = new URL(result.url);
        if (u.protocol === 'https:' && (u.hostname === 'checkout.stripe.com' || u.hostname.endsWith('.stripe.com'))) {
          target = u.href;
        }
      } catch {}
      if (!target) {
        err.textContent = 'Payment setup returned a bad redirect. Please try again or call (864) 863-7800.';
        resetBtn(); return;
      }
      window.location.href = target;
    } catch (fetchErr) {
      err.textContent = 'Network error, please try again or call (864) 863-7800.';
      resetBtn();
    }
  } else {
    launchConfetti();
    setTimeout(() => renderApproved(), 800);
  }
}

// ── REVIEW CAROUSEL ──────────────────────────────────────────
function initReviewCarousel() {
  const carousel = document.getElementById('review-carousel');
  const dotsWrap = document.getElementById('carousel-dots');
  if (!carousel || !dotsWrap) return;
  const slides = Array.from(carousel.querySelectorAll('.review-slide'));
  if (slides.length < 2) return;
  let current = 0;

  // Slides are position:absolute, make all visible to measure, then fix container height
  slides.forEach(s => { s.style.visibility = 'visible'; });
  const maxH = Math.max(...slides.map(s => s.offsetHeight));
  carousel.style.height = maxH + 'px';
  slides.forEach(s => { s.style.visibility = ''; });

  // Build dots
  slides.forEach((_, i) => {
    const dot = document.createElement('button');
    dot.className = 'carousel-dot' + (i === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Review ' + (i + 1));
    dot.addEventListener('click', () => goTo(i));
    dotsWrap.appendChild(dot);
  });

  function goTo(idx) {
    const dots = dotsWrap.querySelectorAll('.carousel-dot');
    slides[current].classList.remove('active');
    current = (idx + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots.forEach((d, i) => d.classList.toggle('active', i === current));
  }

  setInterval(() => goTo(current + 1), 7000);
}

// ── ERROR ─────────────────────────────────────────────────────
function showError(title, msg) {
  // Build via DOM APIs (not template literal innerHTML) so arbitrary
  // caller-provided HTML in title/msg is never evaluated. Future
  // contributors can pass DB-sourced error messages safely.
  const main = document.getElementById('main');
  main.innerHTML = '';
  const wrap = document.createElement('div'); wrap.className = 'state-wrap';
  wrap.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>';
  const h2 = document.createElement('h2'); h2.textContent = String(title || '');
  const p  = document.createElement('p');  p.textContent  = String(msg || '');
  wrap.appendChild(h2); wrap.appendChild(p);
  main.appendChild(wrap);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
