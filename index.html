<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<!-- Facebook domain verification: FB fetches the root URL for this tag. Keep it
     here even though the page redirects, so ad-account domain verification and
     CAPI keep working. -->
<meta name="facebook-domain-verification" content="xphgod9qalszys17irdfeivwjujzgr" />
<meta name="robots" content="noindex">
<meta http-equiv="refresh" content="0; url=/walk-v2/?src=home">
<link rel="canonical" href="https://backuppowerpro.com/walk-v2/?src=home">
<title>Backup Power Pro</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;background:#0f1b2d;color:#eaf1fb;
       font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif}
  a{color:#7db4ff}
</style>
<script>
  // Send the visitor straight to the quote walk. Preserve any query string
  // (Facebook fbclid/utm/src) so ad attribution is not lost; only add the
  // default src=home when the URL carried no query of its own.
  (function () {
    var q = window.location.search;
    var dest = "/walk-v2/" + (q ? q : "?src=home");
    window.location.replace(dest);
  })();
</script>
</head>
<body>
<p>Taking you to your quote. <a href="/walk-v2/?src=home">Continue</a></p>
</body>
</html>
