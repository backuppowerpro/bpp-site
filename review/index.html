  <div class="card">
    <h1>Taking you to Google&hellip;</h1>
    <p>Thank you for leaving Backup Power Pro a review. If this page does not move on its own, tap the button below.</p>
    <a class="btn" href="https://g.page/r/CVxLI9ZsiZS_EAE/review">Leave your review</a>
  </div>
  <script>
    var REVIEW_URL = "https://g.page/r/CVxLI9ZsiZS_EAE/review";
    // Manual tap: capture review_google_click, then give the beacon a brief
    // moment to leave before navigating (matches the auto-redirect delay below).
    document.querySelector('a.btn').addEventListener('click', function(e){
      e.preventDefault();
      if (typeof posthog !== 'undefined') posthog.capture('review_google_click');
      setTimeout(function(){ window.location.href = REVIEW_URL; }, 150);
    });
    // Auto-redirect (unchanged behavior, just no longer instant): 0ms never let the
    // PostHog pageview above reach the network before nav, so this stage stayed blind.
    setTimeout(function(){ location.replace(REVIEW_URL); }, 900);
  </script>
